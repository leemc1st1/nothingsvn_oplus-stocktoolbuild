name: NothingsVN Oplus ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: true
      builder_name:
        description: 'Builder name'
        required: false
      builder_id:
        description: 'Builder ID'
        required: false

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
    steps:
      - name: Clean unused files and applications
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Send start notification
        run: |
          pip install requests
          python notify.py start "${{ github.repository }}" "${{ inputs.input_url }}" "oplus" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: Set timezone
        run: |
          echo "Setting Vietnam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install tools
        run: |
          set -e
          set -o pipefail
          echo "[STEP] Install tools" | tee -a build_action.log
          sudo bash setup.sh 2>&1 | tee -a build_action.log

      - name: Grant file permissions
        run: |
          sudo chmod 777 -R *

      - name: Build ROM
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          set -e
          set -o pipefail
          echo "[STEP] Build ROM" | tee -a build_action.log
          sudo -E bash build.sh "$INPUT_URL" "n" "${{ github.repository }}" "oplus" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}" 2>&1 | tee -a build_action.log

      - name: Pack ROM
        run: |
          set -e
          set -o pipefail
          python notify.py pack "${{ github.repository }}" "${{ inputs.input_url }}" "oplus" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"
          echo "[STEP] Pack ROM" | tee -a build_action.log
          sudo bash packROM.sh n 2>&1 | tee -a build_action.log

      - name: Set up Rclone
        run: |
          set -e
          set -o pipefail
          echo "[STEP] Set up Rclone" | tee -a build_action.log
          sudo -E bash uploadROM.sh setup "${{ secrets.GH_TOKEN }}" "${{ secrets.GH_REPO }}" "${{ secrets.RCLONE_TOKEN_PATH }}" 2>&1 | tee -a build_action.log

      - name: Upload ROM to cloud
        run: |
          set -e
          set -o pipefail
          python notify.py upload "${{ github.repository }}" "${{ inputs.input_url }}" "oplus" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"
          echo "[STEP] Upload ROM to cloud" | tee -a build_action.log
          sudo -E bash uploadROM.sh 2>&1 | tee -a build_action.log

      - name: Send success notification
        if: success()
        env:
          NOTIFY_WORKFLOW_CONCLUSION: success
        run: |
          python notify.py success "${{ github.repository }}" "${{ inputs.input_url }}" "oplus" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: Send failure notification
        if: failure()
        env:
          NOTIFY_WORKFLOW_CONCLUSION: failure
          NOTIFY_ERROR_LOG: build_action.log
        run: |
          python notify.py fail "${{ github.repository }}" "${{ inputs.input_url }}" "oplus" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: Send cancellation notification
        if: cancelled()
        env:
          NOTIFY_WORKFLOW_CONCLUSION: cancelled
          NOTIFY_ERROR_LOG: build_action.log
          NOTIFY_ERROR_REASON: Workflow run was cancelled before completion.
        run: |
          python notify.py cancelled "${{ github.repository }}" "${{ inputs.input_url }}" "oplus" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"
